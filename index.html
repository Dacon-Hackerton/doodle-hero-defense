<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>낙서 용사 디펜스</title>
  <link rel="stylesheet" href="./src/css/style.css" />
</head>
<body>
  <div id="app">
    <section id="startScreen" class="screen">
      <div class="start-content">
        <h1>낙서 용사 디펜스</h1>
        <p>내가 그린 낙서가 전투 유닛이 되는 라인 디펜스 게임</p>
        <button id="startButton" type="button" class="primary-btn">시작하기</button>
      </div>
    </section>

    <section id="drawScreen" class="screen hidden">
      <header class="screen-header">
        <h1>낙서 용사 디펜스</h1>
        <h2>캐릭터 그리기</h2>
      </header>

      <div class="draw-layout">
        <canvas id="drawCanvas" width="400" height="400"></canvas>

        <div class="draw-controls tool-panel">
          <label>
            캐릭터 이름
            <input
              type="text"
              id="characterNameInput"
              placeholder="캐릭터 이름 입력"
              value="용사"
            />
          </label>

          <div class="tool-group">
            <p>색상 선택</p>

            <div class="color-palette">
              <button type="button" class="color-btn active" data-color="#000000" style="background-color: #000000;" title="검정"></button>
              <button type="button" class="color-btn" data-color="#0066ff" style="background-color: #0066ff;" title="파랑"></button>
              <button type="button" class="color-btn" data-color="#ffeb00" style="background-color: #ffeb00;" title="노랑"></button>
              <button type="button" class="color-btn" data-color="#ff0000" style="background-color: #ff0000;" title="빨강"></button>
              <button type="button" class="color-btn" data-color="#8e24aa" style="background-color: #8e24aa;" title="보라"></button>
              <button type="button" class="color-btn" data-color="#00c853" style="background-color: #00c853;" title="녹색"></button>
            </div>
          </div>

          <div class="tool-group">
            <p id="inkText">잉크: 100%</p>
          </div>

          <label>
            브러시 크기
            <input type="range" id="brushSizeInput" min="1" max="30" value="5" />
          </label>

          <button id="eraserButton" type="button">지우개</button>
          <button id="undoButton" type="button">되돌리기</button>
          <button id="clearButton" type="button">전체 지우기</button>
          <button id="judgeButton" type="button" class="primary-btn">감정하기</button>
        </div>
      </div>
    </section>

    <section id="judgeScreen" class="screen hidden">
      <header class="screen-header">
        <h1>감정 결과</h1>
      </header>

      <div class="result-card">
        <img id="previewImage" alt="캐릭터 미리보기" />

        <h3 id="resultName">이름</h3>
        <p id="resultGrade">등급: -</p>
        <p id="resultPower">전투력: -</p>
        <p id="resultComment">AI 감정 코멘트</p>

        <div class="stat-box">
          <p id="statAttack">공격력: 0</p>
          <p id="statHp">체력: 0</p>
          <p id="statSpeed">이동 속도: 0</p>
          <p id="statAttackSpeed">공격 속도: 0</p>
          <p id="statRange">사거리: 0</p>
          <p id="statCost">소환 비용: 0</p>
        </div>
      </div>

      <button id="backDrawButton" type="button">다시 그리기</button>
      <button id="battleStartButton" type="button" class="primary-btn">전투 시작</button>
    </section>

    <section id="battleScreen" class="screen hidden">
      <header class="screen-header battle-header">
        <h1>전투 화면</h1>
        <button id="backDrawFromBattleButton" type="button">그림판으로</button>
      </header>

      <canvas id="battleCanvas" width="960" height="540"></canvas>
    </section>
  </div>

  <script type="module" src="./src/js/main.js"></script>
</body>
</html>
