<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>낙서 용사 디펜스</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- 타이틀 화면 -->
    <section id="titleScreen" class="screen active">
      <h1>낙서 용사 디펜스</h1>
      <button id="startBtn">게임 시작</button>
    </section>

    <!-- 그림판 화면 -->
    <section id="drawScreen" class="screen">
      <h2>캐릭터 그리기</h2>

      <div class="draw-layout">
        <canvas id="drawCanvas" width="512" height="512"></canvas>

        <div class="tool-panel">
          <label>
            캐릭터 이름
            <input type="text" id="nameInput" value="용사" />
          </label>

          <div class="tool-group">
            <p>색상 선택</p>

            <div class="color-palette">
              <button class="color-btn active" data-color="#000000" style="background-color: #000000;" title="검정"></button>
              <button class="color-btn" data-color="#2196f3" style="background-color: #2196f3;" title="파랑"></button>
              <button class="color-btn" data-color="#ffeb3b" style="background-color: #ffeb3b;" title="노랑"></button>
              <button class="color-btn" data-color="#f44336" style="background-color: #f44336;" title="빨강"></button>
              <button class="color-btn" data-color="#9c27b0" style="background-color: #9c27b0;" title="보라"></button>
            </div>
          </div>

          <label>
            브러시 크기
            <input type="range" id="brushSize" min="1" max="30" value="5" />
          </label>

          <button id="eraserBtn">지우개</button>
          <button id="undoBtn">되돌리기</button>
          <button id="clearBtn">전체 지우기</button>
          <button id="judgeBtn">AI 감정하기</button>
        </div>
      </div>
    </section>

    <!-- AI 감정 화면 -->
    <section id="judgeScreen" class="screen">
      <h2>AI 감정 결과</h2>

      <div class="result-card">
        <img id="previewImage" alt="캐릭터 미리보기" />

        <h3 id="resultName">이름</h3>
        <p id="resultGrade">등급: -</p>
        <p id="resultPower">전투력: -</p>
        <p id="resultComment">AI 감정 코멘트</p>

        <div class="stat-box">
          <p id="statAttack">공격력: 0</p>
          <p id="statHp">체력: 0</p>
          <p id="statSpeed">이동 속도: 0</p>
          <p id="statAttackSpeed">공격 속도: 0</p>
          <p id="statRange">사거리: 0</p>
          <p id="statCost">소환 비용: 0</p>
        </div>
      </div>

      <button id="goBattleBtn">전투 화면 테스트</button>
      <button id="backDrawBtn">다시 그리기</button>
    </section>

    <!-- 전투 화면 -->
    <section id="battleScreen" class="screen">
      <h2>전투 화면</h2>
      <canvas id="battleCanvas" width="800" height="400"></canvas>
      <br />
      <button id="backDrawFromBattleBtn">그림판으로</button>
    </section>

  </div>

  <script src="main.js"></script>
</body>
</html>
